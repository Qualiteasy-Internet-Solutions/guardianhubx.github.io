## 📋 FRONT MATTER TEMPLATE FOR SPANISH

title: "Título (máx 60 caracteres)"
description: "Meta descripción (120-160 caracteres)"
slug: "slug-url-amigable"
publishDate: 2026-03-15
type: "blog"
category: "threat-analysis"  # threat-analysis | how-to-guide | news | compliance | product | educational
tags:
  - phishing
  - estafas-hacienda
  - concienciación-y-formación
relatedProduct: "guardianaradar"  # optional
featured: false
keywords:
  - "palabra clave 1"
  - "palabra clave 2"

