## ✅ CHECKLIST FOR BLOG DRAFTS

When your writer submits a draft:

- [ ] Title: 40-60 characters, keyword-focused
- [ ] Description: 120-160 characters (meta quality)
- [ ] Slug: lowercase, hyphens, no accents
- [ ] Tags: 3-8 from standardized list
- [ ] Category: Only ONE from approved list
- [ ] Internal links: At least 2-3 to website pages
- [ ] Product link: If applicable, 1 CTA
- [ ] Word count: Minimum 800 words
- [ ] Formatting: H2/H3 headers, bullet points
- [ ] Images: Format blog/YYYY/descriptive-name.png
