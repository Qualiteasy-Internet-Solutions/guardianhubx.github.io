## 📚 CONTENT CATEGORIES

threat-analysis: Análisis de amenazas y vulnerabilidades específicas
how-to-guide: Guías prácticas paso a paso
news: Noticias y tendencias actuales
compliance: Normativa y regulaciones
product: Casos de uso y features de productos
educational: Definiciones y educación básica

