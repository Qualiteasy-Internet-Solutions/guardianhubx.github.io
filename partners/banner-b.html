<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 300px; height: 250px; overflow: hidden; }
  a {
    display: flex; flex-direction: column; justify-content: flex-end;
    width: 300px; height: 250px;
    background: url('/img/guardianradar-informe.webp') center/cover no-repeat;
    text-decoration: none; color: white;
    font-family: Arial, sans-serif; overflow: hidden; position: relative;
  }
  .overlay {
    background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.1) 100%);
    padding: 16px 18px 18px;
  }
  .logo { height: 22px; width: auto; margin-bottom: 8px; display: block; }
  .title { font-size: 14px; font-weight: 700; line-height: 1.3; margin-bottom: 8px; color: white; }
  .cta {
    background: #007BFF; color: white; font-size: 11px; font-weight: 700;
    padding: 7px 14px; border-radius: 5px; display: inline-block;
  }
</style>
</head>
<body>
<a id="banner-link" href="#" target="_blank" rel="noopener sponsored">
  <div class="overlay">
    <img src="/img/guardianradar-logo.webp" alt="GuardianRadar" class="logo">
    <div class="title">Vigilancia digital para autónomos y pymes</div>
    <div class="cta">Saber más →</div>
  </div>
</a>
<script>
  var ref = new URLSearchParams(window.location.search).get('ref') || '';
  document.getElementById('banner-link').href =
    'https://guardianhubx.com/es/guardianradar/' + (ref ? '?ref=' + ref : '');
</script>
</body>
</html>
