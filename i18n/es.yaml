# --- CAMINO A: PERFIL DIRECCIÓN (Negocio & Impacto) ---
- id: "qa_1_impact"
  translation: "Si debido a un ciberataque todos los sistemas se bloquearan hoy y no pudierais trabajar durante 3 días, ¿cuál sería el impacto?"
- id: "qa_1_opt_1"
  translation: "Catastrófico: Pérdidas económicas graves y daño reputacional inmediato."
- id: "qa_1_opt_2"
  translation: "Grave: Sería un caos, pero podríamos operar manualmente con dificultades."
- id: "qa_1_opt_3"
  translation: "Mínimo: Tenemos sistemas de respaldo y continuidad garantizados."

- id: "qa_2_human"
  translation: "¿Crees que tus empleados sabrían distinguir un correo de phishing sofisticado de uno real?"
- id: "qa_2_opt_1"
  translation: "No, seguramente alguien caería en la trampa."
- id: "qa_2_opt_2"
  translation: "Hemos hecho alguna formación puntual, pero no estoy seguro al 100%."
- id: "qa_2_opt_3"
  translation: "Sí, realizamos formación continua y pruebas mensuales."

- id: "qa_3_response"
  translation: "Si sufrís un ataque ahora mismo, ¿tenéis un protocolo de actuación claro (a quién llamar, qué desconectar)?"
- id: "qa_3_opt_1"
  translation: "No, improvisaríamos o llamaríamos al informático de urgencia."
- id: "qa_3_opt_2"
  translation: "Tenemos algo escrito, pero nunca hemos hecho un simulacro."
- id: "qa_3_opt_3"
  translation: "Sí, tenemos un Plan de Respuesta a Incidentes probado anualmente."

- id: "qa_4_insurance"
  translation: "¿Vuestra póliza de seguros cubre específicamente incidentes de ciberseguridad (rescates, multas, paralización)?"
- id: "qa_4_opt_1"
  translation: "No tenemos ciberseguro o no lo sé."
- id: "qa_4_opt_2"
  translation: "Sí, pero creo que la cobertura es básica o limitada."
- id: "qa_4_opt_3"
  translation: "Sí, tenemos una póliza específica y revisada regularmente."

- id: "qa_5_budget"
  translation: "¿Cómo definirías la inversión en ciberseguridad en tu empresa?"
- id: "qa_5_opt_1"
  translation: "Reactiva: Solo invertimos cuando algo se rompe."
- id: "qa_5_opt_2"
  translation: "Básica: Tenemos presupuesto para antivirus y licencias estándar."
- id: "qa_5_opt_3"
  translation: "Estratégica: Es una prioridad con presupuesto dedicado y recurrente."

# --- CAMINO B: PERFIL TÉCNICO (Operativo & Controles) ---
- id: "qb_1_mfa"
  translation: "¿Cuál es el nivel de implementación del Doble Factor de Autenticación (MFA/2FA)?"
- id: "qb_1_opt_1"
  translation: "Inexistente o solo para algunos administradores."
- id: "qb_1_opt_2"
  translation: "Parcial: Solo en el correo (Microsoft 365 / Google)."
- id: "qb_1_opt_3"
  translation: "Total: En correo, VPN, acceso a servidores y aplicaciones críticas."

- id: "qb_2_backup"
  translation: "¿Cómo gestionáis las copias de seguridad frente al Ransomware?"
- id: "qb_2_opt_1"
  translation: "Copias locales o en red (USB/NAS) accesibles desde los equipos."
- id: "qb_2_opt_2"
  translation: "Copia en la nube, pero sin garantía de inmutabilidad."
- id: "qb_2_opt_3"
  translation: "Copias inmutables (Object Lock / Air-gapped) y regla 3-2-1."

- id: "qb_3_endpoint"
  translation: "¿Qué tecnología utilizáis para proteger los endpoints (puestos de trabajo)?"
- id: "qb_3_opt_1"
  translation: "Antivirus tradicional basado en firmas."
- id: "qb_3_opt_2"
  translation: "Antivirus de nueva generación (NGAV)."
- id: "qb_3_opt_3"
  translation: "EDR / XDR con monitorización activa o servicio SOC."

- id: "qb_4_phishing_sim"
  translation: "¿Realizáis campañas activas de simulación de Phishing?"
- id: "qb_4_opt_1"
  translation: "No, nunca."
- id: "qb_4_opt_2"
  translation: "Puntualmente (una vez al año)."
- id: "qb_4_opt_3"
  translation: "Sí, de forma recurrente y automatizada."

- id: "qb_5_vuln"
  translation: "¿Cada cuánto realizáis escaneos de vulnerabilidades o gestión de parches?"
- id: "qb_5_opt_1"
  translation: "Manual o cuando el sistema operativo lo fuerza."
- id: "qb_5_opt_2"
  translation: "Gestión de parches automatizada, pero sin escaneos de vulnerabilidades."
- id: "qb_5_opt_3"
  translation: "Escaneos recurrentes y política de parcheo estricta."

# --- CAMINO C: INDIVIDUAL (Higiene Digital) ---
- id: "qc_1_passwords"
  translation: "Sinceramente, ¿utilizas la misma contraseña (o variaciones muy similares) para el correo personal, redes y el trabajo?"
- id: "qc_1_opt_1"
  translation: "Sí, es imposible recordarlas todas si no."
- id: "qc_1_opt_2"
  translation: "En algunos servicios poco importantes sí, pero intento variarlas."
- id: "qc_1_opt_3"
  translation: "No, utilizo un gestor de contraseñas y todas son únicas."

- id: "qc_2_phishing"
  translation: "Cuando recibes un correo urgente del banco o paquetería con un enlace, ¿qué haces?"
- id: "qc_2_opt_1"
  translation: "Si parece importante, hago clic para ver qué pasa."
- id: "qc_2_opt_2"
  translation: "Reviso el remitente, pero si el logo parece real, confío."
- id: "qc_2_opt_3"
  translation: "Nunca hago clic. Entro manualmente a la web oficial o app."

- id: "qc_3_wifi"
  translation: "Cuando te conectas a una Wi-Fi pública (hotel, aeropuerto, cafetería)..."
- id: "qc_3_opt_1"
  translation: "Me conecto y navego normalmente."
- id: "qc_3_opt_2"
  translation: "Me conecto pero evito entrar en el banco."
- id: "qc_3_opt_3"
  translation: "Siempre activo la VPN o uso los datos de mi móvil (4G/5G)."

- id: "qc_4_updates"
  translation: "Cuando tu dispositivo te avisa de una actualización de seguridad pendiente..."
- id: "qc_4_opt_1"
  translation: "Lo pospongo indefinidamente ('Recordar más tarde')."
- id: "qc_4_opt_2"
  translation: "Lo hago al cabo de unos días o semanas."
- id: "qc_4_opt_3"
  translation: "Actualizo inmediatamente."
- id: "form_analyzed_msg"
  translation: "Hemos analizado tu perfil de seguridad."

